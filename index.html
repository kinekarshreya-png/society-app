<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Society Management Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --brown-dark: #5a3825;
    --brown-mid: #8b5e3c;
    --brown-light: #c49a6c;
    --cream: #f9f4ef;
    --bg: #e6c9a8;
    --white: #ffffff;
    --red: #c0392b;
    --red-hover: #a93226;
    --shadow: 0 10px 30px rgba(90,56,37,0.15);
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Lato', sans-serif;
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    background-image: radial-gradient(ellipse at top left, #d4a96a 0%, #e6c9a8 50%, #c9a882 100%);
  }

  /* ── Pages ── */
  .page {
    display: none;
    width: 90%;
    max-width: 560px;
    margin: 50px auto 80px;
    background: var(--white);
    padding: 32px 28px;
    border-radius: 20px;
    box-shadow: var(--shadow);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Typography ── */
  h2 {
    font-family: 'Playfair Display', serif;
    text-align: center;
    color: var(--brown-dark);
    margin: 0 0 24px;
    font-size: 1.7rem;
  }

  h3 {
    font-family: 'Playfair Display', serif;
    color: var(--brown-dark);
    margin: 22px 0 10px;
    font-size: 1.15rem;
    border-bottom: 2px solid var(--bg);
    padding-bottom: 6px;
  }

  /* ── Inputs ── */
  input[type="text"],
  input[type="email"],
  input[type="password"],
  input[type="number"],
  input[type="date"],
  input[type="file"] {
    width: 100%;
    padding: 11px 14px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1.5px solid #ddd;
    font-family: inherit;
    font-size: 0.95rem;
    background: var(--cream);
    transition: border 0.2s;
    display: block;
  }

  input:focus {
    outline: none;
    border-color: var(--brown-light);
  }

  /* ── Buttons ── */
  .btn {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--brown-mid);
    color: white;
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    font-size: 1rem;
  }

  .btn-primary:hover { background: var(--brown-dark); }

  .btn-sm {
    padding: 7px 14px;
    font-size: 0.82rem;
    border-radius: 8px;
  }

  .btn-open {
    background: var(--brown-mid);
    color: white;
  }

  .btn-open:hover { background: var(--brown-dark); }

  .btn-delete {
    background: var(--red);
    color: white;
  }

  .btn-delete:hover { background: var(--red-hover); }

  .btn-export {
    background: #2e7d32;
    color: white;
  }

  .btn-export:hover { background: #1b5e20; }

  .btn-back {
    background: transparent;
    color: var(--brown-mid);
    border: 1.5px solid var(--brown-mid);
    margin-bottom: 16px;
    padding: 8px 16px;
  }

  .btn-back:hover {
    background: var(--brown-mid);
    color: white;
  }

  /* ── Cards ── */
  .card {
    background: var(--cream);
    padding: 14px 16px;
    margin: 10px 0;
    border-radius: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.07);
  }

  .society-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .society-card .name {
    font-weight: 700;
    color: var(--brown-dark);
    font-size: 0.95rem;
    flex: 1;
  }

  .society-card .uid {
    color: #888;
    font-size: 0.8rem;
  }

  .society-card .actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .upload-card img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 10px;
    max-height: 260px;
    object-fit: cover;
  }

  .upload-card .detail-row {
    display: flex;
    gap: 6px;
    margin: 4px 0;
    font-size: 0.9rem;
  }

  .upload-card .label {
    font-weight: 700;
    color: var(--brown-dark);
    min-width: 80px;
  }

  /* ── Society list scroll ── */
  #societyList {
    max-height: 340px;
    overflow-y: auto;
    padding-right: 4px;
  }

  #societyList::-webkit-scrollbar { width: 5px; }
  #societyList::-webkit-scrollbar-thumb { background: var(--brown-light); border-radius: 4px; }

  /* ── FAB Upload Button ── */
  #uploadBtn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--brown-mid);
    width: 58px;
    height: 58px;
    border-radius: 50%;
    font-size: 30px;
    color: white;
    border: none;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    cursor: pointer;
    display: none;
    transition: background 0.2s, transform 0.2s;
    line-height: 1;
  }

  #uploadBtn:hover {
    background: var(--brown-dark);
    transform: scale(1.08) rotate(45deg);
  }

  /* ── Upload Modal ── */
  #uploadModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #uploadModal.open { display: flex; }

  #uploadModal .modal-box {
    background: white;
    border-radius: 20px;
    padding: 28px 26px;
    width: 90%;
    max-width: 440px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    animation: fadeIn 0.25s ease;
  }

  #uploadModal h3 {
    margin-top: 0;
    border: none;
  }

  .modal-close {
    float: right;
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: #888;
    line-height: 1;
  }

  .modal-close:hover { color: var(--brown-dark); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    color: #aaa;
    padding: 30px 0;
    font-style: italic;
  }

  /* ── Badge ── */
  .badge {
    background: var(--brown-light);
    color: white;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.75rem;
    font-weight: 700;
  }
</style>
</head>
<body>

<!-- ════════ LOGIN PAGE ════════ -->
<div class="page" id="loginPage" style="display:block;">
  <h2>🏘️ Society Expense Portal</h2>
  <input type="email" id="userid" placeholder="Email Address">
  <input type="password" id="password" placeholder="Password">
  <button class="btn btn-primary" onclick="login()">Login</button>
</div>

<!-- ════════ SUPER ADMIN PAGE ════════ -->
<div class="page" id="superadminPage">
  <h2>Super Admin Dashboard</h2>

  <h3>➕ Create New Society</h3>
  <input type="text" id="socName" placeholder="Society Name">
  <input type="date" id="socDate">
  <button class="btn btn-primary" onclick="createSociety()">Create Society</button>

  <h3>🏢 Existing Societies</h3>
  <div id="societyList"></div>
</div>

<!-- ════════ MEMBER / SOCIETY VIEW PAGE ════════ -->
<div class="page" id="memberPage">
  <button class="btn btn-back" id="backBtn" style="display:none;" onclick="goBack()">← Back to Dashboard</button>
  <h2 id="memberSocName"></h2>
  <div id="uploads"></div>
  <div id="uploadsEmpty" class="empty-state" style="display:none;">No bills uploaded yet.</div>
</div>

<!-- ════════ FLOATING UPLOAD BUTTON ════════ -->
<button id="uploadBtn" onclick="openUpload()">+</button>

<!-- ════════ UPLOAD MODAL ════════ -->
<div id="uploadModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeUpload()">✕</button>
    <h3>📎 Upload Bill / Voucher</h3>
    <input type="file" id="photo" accept="image/*">
    <input type="date" id="date">
    <input type="text" id="head" placeholder="Expense Head (e.g. Maintenance)">
    <input type="number" id="amount" placeholder="Amount (₹)">
    <input type="text" id="narration" placeholder="Short Narration">
    <button class="btn btn-primary" onclick="saveUpload()" style="margin-top:14px;">Upload</button>
  </div>
</div>

<!-- ════════ SCRIPTS ════════ -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ════════════════════════════════════════════
//  FIREBASE CONFIG  —  DO NOT CHANGE
// ════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCY1hdpbGyN7byYyNOg7VHLEzfeadnddGI",
  authDomain: "society-management-d19f9.firebaseapp.com",
  projectId: "society-management-d19f9",
  storageBucket: "society-management-d19f9.firebasestorage.app",
  messagingSenderId: "145344389199",
  appId: "1:145344389199:web:a32affa5732fc825460a3a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentSociety = null;
let isSuperAdmin    = false;

// ════════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════════
function login() {
  const email    = document.getElementById("userid").value.trim();
  const password = document.getElementById("password").value.trim();

  // FIX 3: corrected super-admin password to admin@123
  if (email === "companyadmin@gmail.com" && password === "admin@123") {
    isSuperAdmin = true;
    showPage("superadminPage");
    loadSocieties();
    return;
  }

  db.collection("societies")
    .where("email", "==", email)
    .where("password", "==", password)
    .get()
    .then(snapshot => {
      if (snapshot.empty) { alert("Invalid Login. Please check your email and password."); return; }

      snapshot.forEach(doc => { currentSociety = doc.data().name; });

      isSuperAdmin = false;
      showPage("memberPage");
      document.getElementById("uploadBtn").style.display = "block";
      document.getElementById("memberSocName").innerText = currentSociety;
      document.getElementById("backBtn").style.display   = "none";  // members have no back button
      loadUploads();
    })
    .catch(err => alert("Error: " + err.message));
}

// ════════════════════════════════════════════
//  PAGE HELPER
// ════════════════════════════════════════════
function showPage(id) {
  ["loginPage", "superadminPage", "memberPage"].forEach(p => {
    document.getElementById(p).style.display = "none";
  });
  document.getElementById(id).style.display = "block";
}

// ════════════════════════════════════════════
//  CREATE SOCIETY
// ════════════════════════════════════════════
function createSociety() {
  const name = document.getElementById("socName").value.trim().toLowerCase();
  const date = document.getElementById("socDate").value;

  if (!name || !date) { alert("Please enter society name and start date."); return; }

  const randomPart = Math.random().toString(36).substring(2, 6);
  const userid     = name.substring(0, 3) + randomPart;
  const password   = name.substring(0, 4) + "@123";
  const email      = userid + "@society.com";

  db.collection("societies").add({ name, date, userid, email, password })
    .then(() => {
      alert("Society Created!\n\nEmail: " + email + "\nPassword: " + password);
      document.getElementById("socName").value = "";
      document.getElementById("socDate").value = "";
      loadSocieties();
    })
    .catch(err => alert(err.message));
}

// ════════════════════════════════════════════
//  LOAD SOCIETIES  (FIX 1 + FIX 2)
// ════════════════════════════════════════════
function loadSocieties() {
  db.collection("societies").get().then(snapshot => {
    let html = "";

    if (snapshot.empty) {
      html = "<div class='empty-state'>No societies created yet.</div>";
    } else {
      snapshot.forEach(doc => {
        const d = doc.data();
        html += `
          <div class="card society-card">
            <div>
              <div class="name">${d.name}</div>
              <div class="uid">${d.email}</div>
            </div>
            <div class="actions">
              <!-- FIX 2: Export button is now INSIDE each society row -->
              <button class="btn btn-sm btn-export" onclick="exportSocietyData('${d.name}')">⬇ Excel</button>
              <!-- FIX 1: Only the Open button opens the society, name is NOT clickable -->
              <button class="btn btn-sm btn-open" onclick="openSociety('${d.name}')">Open</button>
              <button class="btn btn-sm btn-delete" onclick="deleteSociety('${doc.id}')">Delete</button>
            </div>
          </div>`;
      });
    }

    document.getElementById("societyList").innerHTML = html;
  });
}

// ════════════════════════════════════════════
//  OPEN SOCIETY  (FIX 1: Back button works correctly)
// ════════════════════════════════════════════
function openSociety(name) {
  currentSociety = name;
  showPage("memberPage");
  document.getElementById("backBtn").style.display     = "block";   // show back for admin
  document.getElementById("uploadBtn").style.display   = "none";    // admin only views, no upload
  document.getElementById("memberSocName").innerText   = name;
  loadUploads();
}

// ════════════════════════════════════════════
//  GO BACK  (FIX 1: properly returns to admin dashboard)
// ════════════════════════════════════════════
function goBack() {
  currentSociety = null;
  document.getElementById("uploads").innerHTML = "";
  showPage("superadminPage");
  document.getElementById("uploadBtn").style.display = "none";
  loadSocieties();
}

// ════════════════════════════════════════════
//  UPLOAD MODAL
// ════════════════════════════════════════════
function openUpload()  { document.getElementById("uploadModal").classList.add("open"); }
function closeUpload() { document.getElementById("uploadModal").classList.remove("open"); }

// Close modal if clicking outside the box
document.getElementById("uploadModal").addEventListener("click", function(e) {
  if (e.target === this) closeUpload();
});

// ════════════════════════════════════════════
//  SAVE UPLOAD
// ════════════════════════════════════════════
function saveUpload() {
  const file      = document.getElementById("photo").files[0];
  const date      = document.getElementById("date").value;
  const head      = document.getElementById("head").value.trim();
  const amount    = document.getElementById("amount").value.trim();
  const narration = document.getElementById("narration").value.trim();

  if (!file || !date || !head || !amount) { alert("Please fill all required fields."); return; }

  const reader = new FileReader();
  reader.onload = function(e) {
    db.collection("uploads").add({
      society: currentSociety,
      image: e.target.result,
      date, head, amount, narration,
      timestamp: Date.now()
    }).then(() => {
      alert("Bill uploaded successfully!");
      closeUpload();
      // Clear form
      document.getElementById("photo").value    = "";
      document.getElementById("date").value     = "";
      document.getElementById("head").value     = "";
      document.getElementById("amount").value   = "";
      document.getElementById("narration").value = "";
      loadUploads();
    }).catch(err => alert("Upload failed: " + err.message));
  };
  reader.readAsDataURL(file);
}

// ════════════════════════════════════════════
//  LOAD UPLOADS
// ════════════════════════════════════════════
function loadUploads() {
  const area  = document.getElementById("uploads");
  const empty = document.getElementById("uploadsEmpty");
  area.innerHTML = "<div class='empty-state'>Loading...</div>";

  db.collection("uploads")
    .where("society", "==", currentSociety)
    .get()
    .then(snapshot => {
      area.innerHTML = "";
      if (snapshot.empty) {
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";

      snapshot.forEach(doc => {
        const u   = doc.data();
        const div = document.createElement("div");
        div.className = "card upload-card";
        div.innerHTML = `
          <img src="${u.image}" alt="Bill Image">
          <div class="detail-row"><span class="label">📅 Date</span><span>${u.date}</span></div>
          <div class="detail-row"><span class="label">🗂 Head</span><span>${u.head}</span></div>
          <div class="detail-row"><span class="label">💰 Amount</span><span>₹${u.amount}</span></div>
          <div class="detail-row"><span class="label">📝 Note</span><span>${u.narration || "—"}</span></div>`;
        area.appendChild(div);
      });
    });
}

// ════════════════════════════════════════════
//  DELETE SOCIETY
// ════════════════════════════════════════════
function deleteSociety(docId) {
  if (!confirm("Deleting this society will remove it from the list.\n\nContinue?")) return;

  db.collection("societies").doc(docId).delete()
    .then(() => { alert("Society deleted."); loadSocieties(); })
    .catch(err => alert(err.message));
}

// ════════════════════════════════════════════
//  EXPORT TO EXCEL  (FIX 2: exports correct society with proper headings)
// ════════════════════════════════════════════
function exportSocietyData(societyName) {
  db.collection("uploads")
    .where("society", "==", societyName)
    .get()
    .then(snapshot => {
      if (snapshot.empty) {
        alert("No data found for: " + societyName);
        return;
      }

      // Build rows with proper headings
      const rows = [["Sr No", "Date", "Expense Head", "Amount (₹)", "Narration", "Society"]];
      let sr = 1;
      snapshot.forEach(doc => {
        const u = doc.data();
        rows.push([sr++, u.date, u.head, u.amount, u.narration || "", u.society]);
      });

      // Create workbook
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(rows);

      // Column widths
      ws['!cols'] = [
        { wch: 8 }, { wch: 14 }, { wch: 22 },
        { wch: 14 }, { wch: 30 }, { wch: 20 }
      ];

      XLSX.utils.book_append_sheet(wb, ws, societyName.substring(0, 31));
      XLSX.writeFile(wb, societyName + "_expenses.xlsx");
    })
    .catch(err => alert("Export failed: " + err.message));
}
</script>
</body>
</html>
