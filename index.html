<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Society Expense Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brown-dark: #5a3825;
    --brown-mid:  #8b5e3c;
    --brown-light:#c49a6c;
    --cream:      #f9f4ef;
    --bg:         #e6c9a8;
    --white:      #ffffff;
    --red:        #c0392b;
    --shadow:     0 10px 30px rgba(90,56,37,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    background: var(--bg);
    background-image: radial-gradient(ellipse at top left, #d4a96a 0%, #e6c9a8 50%, #c9a882 100%);
  }
  /* ── Pages ── */
  .page {
    display: none;
    width: 92%;
    max-width: 560px;
    margin: 44px auto 80px;
    background: var(--white);
    padding: 30px 26px;
    border-radius: 20px;
    box-shadow: var(--shadow);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* ── Typography ── */
  h2 { font-family:'Playfair Display',serif; text-align:center; color:var(--brown-dark); margin-bottom:22px; font-size:1.65rem; }
  h3 { font-family:'Playfair Display',serif; color:var(--brown-dark); margin:20px 0 10px; font-size:1.1rem; border-bottom:2px solid var(--bg); padding-bottom:5px; }

  /* ── Inputs ── */
  input[type=text], input[type=email], input[type=password], input[type=number], input[type=date] {
    width:100%; padding:11px 14px; margin:5px 0; border-radius:10px;
    border:1.5px solid #ddd; font-family:inherit; font-size:0.94rem;
    background:var(--cream); display:block; transition:border .2s;
  }
  input:focus { outline:none; border-color:var(--brown-light); }
  select.inp {
    width:100%; padding:11px 14px; margin:5px 0; border-radius:10px;
    border:1.5px solid #ddd; font-family:inherit; font-size:0.94rem;
    background:var(--cream); display:block; color:#333;
  }
  select.inp:focus { outline:none; border-color:var(--brown-light); }
  .hint { font-size:0.78rem; color:var(--brown-mid); margin:2px 0 5px 2px; min-height:16px; font-style:italic; }

  /* ── Buttons ── */
  .btn {
    display:inline-block; padding:10px 18px; border-radius:10px;
    border:none; cursor:pointer; font-family:inherit;
    font-size:0.9rem; font-weight:700; transition:background .2s, transform .1s;
  }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:var(--brown-mid); color:white; width:100%; padding:12px; margin-top:8px; font-size:1rem; }
  .btn-primary:hover { background:var(--brown-dark); }
  .btn-primary:disabled { background:#bbb; cursor:not-allowed; }
  .btn-sm { padding:6px 13px; font-size:0.81rem; border-radius:8px; }
  .btn-open   { background:var(--brown-mid); color:white; }
  .btn-open:hover   { background:var(--brown-dark); }
  .btn-delete { background:var(--red); color:white; }
  .btn-delete:hover { background:#a93226; }
  .btn-export { background:#2e7d32; color:white; }
  .btn-export:hover { background:#1b5e20; }
  .btn-back   { background:transparent; color:var(--brown-mid); border:1.5px solid var(--brown-mid); margin-bottom:14px; padding:7px 15px; }
  .btn-back:hover { background:var(--brown-mid); color:white; }

  /* photo buttons */
  .photo-btns { display:flex; gap:10px; margin:5px 0; }
  .photo-btns .btn { flex:1; margin-top:0; background:var(--brown-mid); color:white; padding:11px 8px; font-size:0.87rem; }
  .photo-btns .btn.gal { background:#6d4c41; }
  .photo-btns .btn:hover { background:var(--brown-dark); }

  /* ── Cards ── */
  .card { background:var(--cream); padding:13px 15px; margin:9px 0; border-radius:13px; box-shadow:0 2px 8px rgba(0,0,0,.07); }
  .soc-card { display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
  .soc-card .sname { font-weight:700; color:var(--brown-dark); font-size:0.94rem; flex:1; }
  .soc-card .semail { color:#888; font-size:0.78rem; }
  .soc-card .spass  { color:var(--brown-mid); font-size:0.78rem; font-style:italic; }
  .soc-card .acts   { display:flex; gap:6px; flex-wrap:wrap; }

  .upload-card img { width:100%; border-radius:11px; margin-bottom:9px; max-height:250px; object-fit:cover; cursor:zoom-in; }
  .drow { display:flex; gap:6px; margin:3px 0; font-size:0.88rem; }
  .dlbl { font-weight:700; color:var(--brown-dark); min-width:78px; }

  /* ── Society list ── */
  #socList { max-height:340px; overflow-y:auto; padding-right:3px; }
  #socList::-webkit-scrollbar { width:4px; }
  #socList::-webkit-scrollbar-thumb { background:var(--brown-light); border-radius:4px; }

  /* ── FAB ── */
  #uploadBtn {
    position:fixed; bottom:26px; right:26px;
    background:var(--brown-mid); width:56px; height:56px;
    border-radius:50%; font-size:28px; color:white; border:none;
    box-shadow:0 5px 16px rgba(0,0,0,.28); cursor:pointer; display:none;
    transition:background .2s, transform .2s; line-height:1;
  }
  #uploadBtn:hover { background:var(--brown-dark); transform:scale(1.08) rotate(45deg); }

  /* ── Modal ── */
  #uploadModal {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.46); z-index:100;
    align-items:center; justify-content:center;
  }
  #uploadModal.open { display:flex; }
  .modal-box {
    background:white; border-radius:18px; padding:26px 24px;
    width:92%; max-width:430px; max-height:92vh; overflow-y:auto;
    box-shadow:0 18px 50px rgba(0,0,0,.25); animation:fadeIn .22s ease;
  }
  .modal-box h3 { margin-top:0; border:none; }
  .mclose { float:right; background:none; border:none; font-size:1.35rem; cursor:pointer; color:#888; }
  .mclose:hover { color:var(--brown-dark); }

  /* ── Status ── */
  #compStat { font-size:0.78rem; color:var(--brown-mid); margin-top:3px; min-height:16px; }

  /* ── Lightbox ── */
  #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:200; align-items:center; justify-content:center; cursor:zoom-out; }
  #lightbox.open { display:flex; }
  #lightbox img { max-width:94vw; max-height:90vh; border-radius:10px; }

  /* ── Misc ── */
  .empty { text-align:center; color:#aaa; padding:28px 0; font-style:italic; }
  .err   { color:var(--red); font-size:0.82rem; text-align:center; margin-top:6px; min-height:18px; }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="page" id="pgLogin" style="display:block">
  <h2>🏘️ Society Expense Portal</h2>
  <input type="email"    id="inEmail" placeholder="Email Address" autocomplete="username">
  <input type="password" id="inPass"  placeholder="Password" autocomplete="current-password"
         onkeydown="if(event.key==='Enter')login()">
  <div class="err" id="loginErr"></div>
  <button class="btn btn-primary" id="loginBtn" onclick="login()">Login</button>
</div>

<!-- ══ SUPER ADMIN ══ -->
<div class="page" id="pgAdmin">
  <h2>Super Admin Dashboard</h2>

  <h3>➕ Create New Society</h3>
  <input type="text"  id="cName"  placeholder="Society Name  (e.g. Sunrise Apartments)" oninput="showPwdHint()">
  <input type="email" id="cEmail" placeholder="Society Email  (e.g. sunrise@gmail.com)">
  <input type="date"  id="cDate">
  <div class="hint" id="pwdHint"></div>
  <button class="btn btn-primary" id="createBtn" onclick="createSociety()">Create Society</button>

  <h3>🏢 All Societies</h3>
  <div id="socList"><div class="empty">Loading…</div></div>
</div>

<!-- ══ SOCIETY VIEW ══ -->
<div class="page" id="pgSociety">
  <button class="btn btn-back" id="backBtn" style="display:none" onclick="goBack()">← Back</button>
  <h2 id="socTitle"></h2>
  <div id="uploads"></div>
  <div class="empty" id="emptyMsg" style="display:none">No bills uploaded yet.</div>
</div>

<!-- ══ FAB ══ -->
<button id="uploadBtn" onclick="openModal()">+</button>

<!-- ══ UPLOAD MODAL ══ -->
<div id="uploadModal">
  <div class="modal-box">
    <button class="mclose" onclick="closeModal()">✕</button>
    <h3>📎 Upload Bill / Voucher</h3>

    <div class="photo-btns">
      <button type="button" class="btn" onclick="document.getElementById('camInput').click()">📷 Camera</button>
      <button type="button" class="btn gal" onclick="document.getElementById('galInput').click()">🖼 Gallery</button>
    </div>
    <input type="file" id="camInput" accept="image/*" capture="environment" style="display:none" onchange="onPhoto(this)">
    <input type="file" id="galInput" accept="image/*"                        style="display:none" onchange="onPhoto(this)">
    <div id="compStat"></div>

    <input type="date"   id="uDate">
    <select class="inp"  id="uHead" onchange="headChange()">
      <option value="">-- Select Expense Head --</option>
      <option>Electricity</option>
      <option>Water Charges</option>
      <option>Maintenance &amp; Repairs</option>
      <option>Housekeeping / Cleaning</option>
      <option>Security / Watchman</option>
      <option>Salaries</option>
      <option>Lift Maintenance</option>
      <option>Garden / Landscaping</option>
      <option>Pest Control</option>
      <option>Generator / Fuel</option>
      <option>Printing &amp; Stationery</option>
      <option>Plumbing</option>
      <option>Painting &amp; Whitewash</option>
      <option>Bank Charges</option>
      <option>Insurance</option>
      <option>Audit / Legal Fees</option>
      <option>Telephone / Internet</option>
      <option>Conveyance</option>
      <option>Miscellaneous</option>
      <option value="__other">Other (type below)</option>
    </select>
    <input type="text" id="uHeadOther" placeholder="Type expense head" style="display:none">

    <input type="number" id="uAmt"  placeholder="Amount (₹)">
    <input type="text"   id="uNarr" placeholder="Narration (optional)">

    <button class="btn btn-primary" id="saveBtn" onclick="saveUpload()">Upload</button>
  </div>
</div>

<!-- ══ LIGHTBOX ══ -->
<div id="lightbox" onclick="this.classList.remove('open')">
  <img id="lbImg" src="" alt="Bill">
</div>

<!-- ══ SCRIPTS ══ -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
// ══════════════════════════════════════════
//  FIREBASE — DO NOT CHANGE
// ══════════════════════════════════════════
firebase.initializeApp({
  apiKey:            "AIzaSyCY1hdpbGyN7byYyNOg7VHLEzfeadnddGI",
  authDomain:        "society-management-d19f9.firebaseapp.com",
  projectId:         "society-management-d19f9",
  storageBucket:     "society-management-d19f9.firebasestorage.app",
  messagingSenderId: "145344389199",
  appId:             "1:145344389199:web:a32affa5732fc825460a3a"
});
const db   = firebase.firestore();
const auth = firebase.auth();

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let curSociety  = null;
let isAdmin     = false;
let _img        = '';     // compressed image ready to save

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function showPage(id) {
  ['pgLogin','pgAdmin','pgSociety'].forEach(p =>
    document.getElementById(p).style.display = 'none'
  );
  document.getElementById(id).style.display = 'block';
}

// Password = first 4 letters of society name (lowercase) + @123
// e.g. "Sunrise Apartments" → "sunr@123"
function makePwd(name) {
  const clean = name.trim().toLowerCase().replace(/[^a-z]/g, '');
  return clean.substring(0, 4) + '@123';
}

function showPwdHint() {
  const name = document.getElementById('cName').value.trim();
  const hint = document.getElementById('pwdHint');
  hint.textContent = name.length > 0
    ? '🔑 Password will be: ' + makePwd(name)
    : '';
}

// ══════════════════════════════════════════
//  LOGIN
//  Step 1: Firebase Auth sign-in (handles security)
//  Step 2: After auth, check if superadmin or society
// ══════════════════════════════════════════
function login() {
  const email = document.getElementById('inEmail').value.trim().toLowerCase();
  const pwd   = document.getElementById('inPass').value.trim();
  const errEl = document.getElementById('loginErr');
  const btn   = document.getElementById('loginBtn');
  errEl.textContent = '';

  if (!email || !pwd) {
    errEl.textContent = 'Please enter email and password.';
    return;
  }

  btn.textContent = 'Logging in…';
  btn.disabled    = true;

  // Use Firebase Auth to sign in — this is secure
  auth.signInWithEmailAndPassword(email, pwd)
    .then(userCred => {
      const userEmail = userCred.user.email.toLowerCase();

      // ── Superadmin ──
      if (userEmail === 'companyadmin@gmail.com') {
        isAdmin = true;
        btn.textContent = 'Login';
        btn.disabled    = false;
        showPage('pgAdmin');
        loadSocieties();
        return;
      }

      // ── Society user — find their society in Firestore ──
      return db.collection('societies')
        .where('email', '==', userEmail)
        .get()
        .then(snap => {
          btn.textContent = 'Login';
          btn.disabled    = false;
          if (snap.empty) {
            errEl.textContent = 'Account found but no society linked. Contact admin.';
            auth.signOut();
            return;
          }
          snap.forEach(doc => { curSociety = doc.data().name; });
          isAdmin = false;
          showPage('pgSociety');
          document.getElementById('uploadBtn').style.display = 'block';
          document.getElementById('socTitle').textContent    = curSociety.toUpperCase();
          document.getElementById('backBtn').style.display   = 'none';
          loadUploads();
        });
    })
    .catch(e => {
      btn.textContent = 'Login';
      btn.disabled    = false;
      // Show friendly error messages
      if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' ||
          e.code === 'auth/invalid-credential') {
        errEl.textContent = 'Wrong email or password.';
      } else if (e.code === 'auth/invalid-email') {
        errEl.textContent = 'Please enter a valid email.';
      } else if (e.code === 'auth/too-many-requests') {
        errEl.textContent = 'Too many attempts. Try again later.';
      } else {
        errEl.textContent = 'Error: ' + e.message;
      }
    });
}

// ══════════════════════════════════════════
//  CREATE SOCIETY
// ══════════════════════════════════════════
function createSociety() {
  const name  = document.getElementById('cName').value.trim();
  const email = document.getElementById('cEmail').value.trim().toLowerCase();
  const date  = document.getElementById('cDate').value;
  const btn   = document.getElementById('createBtn');

  if (!name || !email || !date) {
    alert('Please fill:\n• Society Name\n• Society Email\n• Start Date');
    return;
  }
  if (!email.includes('@') || !email.includes('.')) {
    alert('Please enter a valid email address.');
    return;
  }

  const password = makePwd(name);

  btn.textContent = 'Creating…';
  btn.disabled    = true;

  // Step 1: Create Firebase Auth account for the society
  // This means they can securely log in
  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      // Step 2: Save society details in Firestore
      return db.collection('societies').add({
        name: name.toLowerCase(), email, password, date
      });
    })
    .then(() => {
      btn.textContent = 'Create Society';
      btn.disabled    = false;
      alert(
        '✔ Society Created!\n\n' +
        'Name    : ' + name + '\n' +
        'Email   : ' + email + '\n' +
        'Password: ' + password + '\n\n' +
        'Share these login details with the society.'
      );
      document.getElementById('cName').value         = '';
      document.getElementById('cEmail').value        = '';
      document.getElementById('cDate').value         = '';
      document.getElementById('pwdHint').textContent = '';
      loadSocieties();
    })
    .catch(e => {
      btn.textContent = 'Create Society';
      btn.disabled    = false;
      if (e.code === 'auth/email-already-in-use') {
        alert('This email already has an account!\nEither the society exists or try a different email.');
      } else {
        alert('Error creating society: ' + e.message);
      }
    });
}

// ══════════════════════════════════════════
//  LOAD SOCIETIES LIST
// ══════════════════════════════════════════
function loadSocieties() {
  const list = document.getElementById('socList');
  list.innerHTML = "<div class='empty'>Loading…</div>";

  db.collection('societies').get()
    .then(snap => {
      if (snap.empty) {
        list.innerHTML = "<div class='empty'>No societies yet. Create one above!</div>";
        return;
      }
      let html = '';
      snap.forEach(doc => {
        const d = doc.data();
        html += `
          <div class="card soc-card">
            <div>
              <div class="sname">${d.name.toUpperCase()}</div>
              <div class="semail">${d.email}</div>
              <div class="spass">Password: ${d.password}</div>
            </div>
            <div class="acts">
              <button class="btn btn-sm btn-export" onclick="exportData('${d.name}')">⬇ Excel</button>
              <button class="btn btn-sm btn-open"   onclick="openSociety('${d.name}')">Open</button>
              <button class="btn btn-sm btn-delete" onclick="delSociety('${doc.id}')">Delete</button>
            </div>
          </div>`;
      });
      list.innerHTML = html;
    })
    .catch(e => {
      list.innerHTML = "<div class='empty'>Error loading. Refresh page.</div>";
    });
}

// ══════════════════════════════════════════
//  OPEN SOCIETY (admin view)
// ══════════════════════════════════════════
function openSociety(name) {
  curSociety = name;
  showPage('pgSociety');
  document.getElementById('backBtn').style.display    = 'block';
  document.getElementById('uploadBtn').style.display  = 'none';
  document.getElementById('socTitle').textContent     = name.toUpperCase();
  loadUploads();
}

function goBack() {
  curSociety = null;
  document.getElementById('uploads').innerHTML = '';
  showPage('pgAdmin');
  document.getElementById('uploadBtn').style.display = 'none';
  loadSocieties();
}

// ══════════════════════════════════════════
//  DELETE SOCIETY
// ══════════════════════════════════════════
function delSociety(id) {
  if (!confirm('Delete this society?\nUploaded bills will stay in database.')) return;
  db.collection('societies').doc(id).delete()
    .then(() => { alert('Society deleted.'); loadSocieties(); })
    .catch(e => alert('Error: ' + e.message));
}

// ══════════════════════════════════════════
//  IMAGE COMPRESSION
//  Max 900px wide, JPEG quality stepped down
//  until safely under 700KB
// ══════════════════════════════════════════
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Cannot read file'));
    reader.onload  = e => {
      const img = new Image();
      img.onerror = () => reject(new Error('Cannot load image'));
      img.onload  = () => {
        const MAX = 900;
        let w = img.width, h = img.height;
        if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }

        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);

        const SAFE = 700 * 1024;
        let data = cv.toDataURL('image/jpeg', 0.60);
        if (data.length > SAFE) data = cv.toDataURL('image/jpeg', 0.40);
        if (data.length > SAFE) data = cv.toDataURL('image/jpeg', 0.25);
        if (data.length > SAFE) {
          const cv2 = document.createElement('canvas');
          cv2.width = 600; cv2.height = Math.round(h * 600 / w);
          cv2.getContext('2d').drawImage(cv, 0, 0, cv2.width, cv2.height);
          data = cv2.toDataURL('image/jpeg', 0.30);
        }
        resolve(data);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function onPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const stat = document.getElementById('compStat');
  const btn  = document.getElementById('saveBtn');
  stat.textContent = '⏳ Compressing (' + (file.size/1024).toFixed(0) + ' KB)…';
  btn.disabled = true;
  _img = '';
  compressImage(file)
    .then(data => {
      _img = data;
      stat.textContent = '✔ Photo ready — ~' + Math.round(data.length * 0.75 / 1024) + ' KB';
      btn.disabled = false;
    })
    .catch(() => {
      stat.textContent = '⚠ Could not process image. Try another.';
      btn.disabled = false;
    });
}

// ══════════════════════════════════════════
//  HEAD DROPDOWN
// ══════════════════════════════════════════
function headChange() {
  const other = document.getElementById('uHeadOther');
  if (document.getElementById('uHead').value === '__other') {
    other.style.display = 'block';
    other.focus();
  } else {
    other.style.display = 'none';
    other.value = '';
  }
}

// ══════════════════════════════════════════
//  UPLOAD MODAL
// ══════════════════════════════════════════
function openModal() {
  _img = '';
  document.getElementById('compStat').textContent = '';
  document.getElementById('saveBtn').disabled     = false;
  document.getElementById('uploadModal').classList.add('open');
}

function closeModal() {
  document.getElementById('uploadModal').classList.remove('open');
  ['uDate','uAmt','uNarr','uHeadOther'].forEach(id =>
    document.getElementById(id).value = '');
  document.getElementById('uHead').value          = '';
  document.getElementById('uHeadOther').style.display = 'none';
  document.getElementById('camInput').value       = '';
  document.getElementById('galInput').value       = '';
  document.getElementById('compStat').textContent = '';
  document.getElementById('saveBtn').textContent  = 'Upload';
  _img = '';
}

document.getElementById('uploadModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ══════════════════════════════════════════
//  SAVE UPLOAD
// ══════════════════════════════════════════
function saveUpload() {
  const date  = document.getElementById('uDate').value;
  const hSel  = document.getElementById('uHead').value;
  const head  = hSel === '__other'
                ? document.getElementById('uHeadOther').value.trim()
                : hSel;
  const amt   = document.getElementById('uAmt').value.trim();
  const narr  = document.getElementById('uNarr').value.trim();
  const btn   = document.getElementById('saveBtn');

  if (!_img)       { alert('Please select a photo first.\nTap 📷 Camera or 🖼 Gallery.'); return; }
  if (!date)       { alert('Please select a date.'); return; }
  if (!head)       { alert('Please select an expense head.'); return; }
  if (!amt)        { alert('Please enter the amount.'); return; }

  btn.textContent = 'Uploading…';
  btn.disabled    = true;

  db.collection('uploads').add({
    society: curSociety, image: _img,
    date, head, amount: amt, narration: narr,
    timestamp: Date.now()
  })
  .then(() => {
    alert('✔ Bill uploaded!');
    closeModal();
    loadUploads();
  })
  .catch(e => {
    alert('Upload failed: ' + e.message);
    btn.textContent = 'Upload';
    btn.disabled    = false;
  });
}

// ══════════════════════════════════════════
//  LOAD UPLOADS
// ══════════════════════════════════════════
function loadUploads() {
  const area  = document.getElementById('uploads');
  const empty = document.getElementById('emptyMsg');
  area.innerHTML = "<div class='empty'>Loading…</div>";

  db.collection('uploads')
    .where('society', '==', curSociety)
    .get()
    .then(snap => {
      area.innerHTML = '';
      if (snap.empty) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      const docs = [];
      snap.forEach(doc => docs.push(doc.data()));
      docs.sort((a, b) => b.timestamp - a.timestamp);

      docs.forEach(u => {
        const d = document.createElement('div');
        d.className = 'card upload-card';
        d.innerHTML =
          '<img src="' + u.image + '" alt="Bill" onclick="openLB(this.src)" title="Click to enlarge">' +
          '<div class="drow"><span class="dlbl">📅 Date</span><span>'   + u.date          + '</span></div>' +
          '<div class="drow"><span class="dlbl">🗂 Head</span><span>'   + u.head          + '</span></div>' +
          '<div class="drow"><span class="dlbl">💰 Amount</span><span>₹' + u.amount      + '</span></div>' +
          '<div class="drow"><span class="dlbl">📝 Note</span><span>'   + (u.narration||'—') + '</span></div>';
        area.appendChild(d);
      });
    })
    .catch(() => {
      area.innerHTML = "<div class='empty'>Error loading. Please refresh.</div>";
    });
}

function openLB(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}

// ══════════════════════════════════════════
//  EXPORT — Excel + HTML photo viewer
// ══════════════════════════════════════════
function exportData(societyName) {
  db.collection('uploads')
    .where('society', '==', societyName)
    .get()
    .then(snap => {
      if (snap.empty) { alert('No uploads for: ' + societyName); return; }

      const docs = [];
      snap.forEach(doc => docs.push(doc.data()));
      docs.sort((a, b) => a.date > b.date ? 1 : -1);

      // ── Excel: "Click Me" plain text (no formula = no warning) ──
      const rows = [['Sr','Date','Expense Head','Amount (₹)','Narration','Society','View Photo']];
      docs.forEach((u, i) =>
        rows.push([i+1, u.date, u.head, u.amount, u.narration||'', u.society,
                   u.image ? 'Click Me' : 'No photo'])
      );
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [{wch:5},{wch:13},{wch:22},{wch:12},{wch:26},{wch:18},{wch:11}];
      XLSX.utils.book_append_sheet(wb, ws, societyName.substring(0,31));

      // ── HTML photo viewer ──
      // Same table as Excel. Each row has "Click Me" button.
      // Clicking opens that photo in an overlay on the same page.
      // Overlay has: Back to List + Prev / Next buttons.
      const htmlFile = societyName + '_photos.html';

      // All images embedded as JS array — self-contained, no extra files
      const imgsJson = JSON.stringify(docs.map(u => u.image || ''));
      const dataJson = JSON.stringify(docs.map(u => ({
        date: u.date, head: u.head, amount: u.amount, narration: u.narration || ''
      })));

      let tRows = '';
      docs.forEach((u, i) => {
        tRows += '<tr id="r' + (i+1) + '">' +
          '<td>' + (i+1) + '</td>' +
          '<td>' + u.date + '</td>' +
          '<td>' + u.head + '</td>' +
          '<td>₹' + u.amount + '</td>' +
          '<td>' + (u.narration||'—') + '</td>' +
          '<td>' + u.society + '</td>' +
          '<td>' + (u.image
            ? '<button class="vbtn" onclick="openPh(' + i + ')">Click Me</button>'
            : '<span style="color:#aaa">No photo</span>') +
          '</td></tr>';
      });

      const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${societyName.toUpperCase()} — Photos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f0ece4;padding:16px}
h1{color:#5a3825;text-align:center;margin-bottom:4px;font-size:1.3rem}
.sub{text-align:center;color:#888;font-size:.78rem;margin-bottom:18px}
.wrap{overflow-x:auto;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse;background:white;font-size:.84rem;min-width:560px}
thead th{background:#5a3825;color:white;padding:9px 11px;text-align:left;white-space:nowrap}
tbody td{padding:8px 11px;border-bottom:1px solid #e6c9a8;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fdf8f3}
.vbtn{background:#8b5e3c;color:white;border:none;padding:5px 13px;border-radius:7px;cursor:pointer;font-size:.8rem;font-weight:700}
.vbtn:hover{background:#5a3825}
/* overlay */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.84);z-index:99;align-items:center;justify-content:center;padding:16px}
#ov.show{display:flex}
#ovBox{background:white;border-radius:16px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
#ovHead{background:#5a3825;color:white;padding:13px 16px;border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:space-between}
#ovHead h3{font-size:.95rem;margin:0}
#backBtn{background:rgba(255,255,255,.2);color:white;border:none;padding:5px 13px;border-radius:7px;cursor:pointer;font-size:.82rem;font-weight:700}
#backBtn:hover{background:rgba(255,255,255,.35)}
#ovBody{padding:14px 16px}
#ovBody img{width:100%;border-radius:9px;margin-top:11px;display:block}
.orow{display:flex;gap:8px;padding:4px 0;font-size:.87rem;border-bottom:1px solid #f0ece4}
.orow:last-of-type{border-bottom:none}
.olbl{font-weight:700;color:#5a3825;min-width:68px}
#navRow{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #f0ece4;justify-content:center;align-items:center}
.nbtn{background:#e6c9a8;color:#5a3825;border:none;padding:6px 15px;border-radius:8px;cursor:pointer;font-weight:700;font-size:.82rem}
.nbtn:hover{background:#c49a6c;color:white}
.nbtn:disabled{opacity:.35;cursor:not-allowed}
#navLbl{font-size:.82rem;color:#888;min-width:60px;text-align:center}
</style>
</head>
<body>
<h1>📋 ${societyName.toUpperCase()} — Bill Photos</h1>
<p class="sub">Same entries as your Excel file. Click "Click Me" on any row to view that photo.</p>
<div class="wrap">
<table>
<thead><tr><th>Sr</th><th>Date</th><th>Expense Head</th><th>Amount</th><th>Narration</th><th>Society</th><th>Photo</th></tr></thead>
<tbody>${tRows}</tbody>
</table>
</div>

<!-- PHOTO OVERLAY -->
<div id="ov">
  <div id="ovBox">
    <div id="ovHead">
      <h3 id="ovTitle">Photo</h3>
      <button id="backBtn" onclick="closePh()">← Back to List</button>
    </div>
    <div id="ovBody">
      <div id="ovDetails"></div>
      <img id="ovImg" src="" alt="Bill photo">
    </div>
    <div id="navRow">
      <button class="nbtn" id="btnPrev" onclick="nav(-1)">◀ Prev</button>
      <span id="navLbl"></span>
      <button class="nbtn" id="btnNext" onclick="nav(+1)">Next ▶</button>
    </div>
  </div>
</div>

<script>
const IMGS = ${imgsJson};
const DATA = ${dataJson};
let cur = 0;

function openPh(i) {
  cur = i;
  render();
  document.getElementById('ov').classList.add('show');
  document.getElementById('ovBox').scrollTop = 0;
}
function closePh() {
  document.getElementById('ov').classList.remove('show');
  const row = document.getElementById('r' + (cur+1));
  if (row) row.scrollIntoView({behavior:'smooth', block:'center'});
}
function nav(d) {
  cur = Math.max(0, Math.min(DATA.length-1, cur+d));
  render();
  document.getElementById('ovBox').scrollTop = 0;
}
function render() {
  const u = DATA[cur], total = DATA.length;
  document.getElementById('ovTitle').textContent   = 'Photo ' + (cur+1) + ' of ' + total;
  document.getElementById('navLbl').textContent    = (cur+1) + ' / ' + total;
  document.getElementById('btnPrev').disabled      = cur === 0;
  document.getElementById('btnNext').disabled      = cur === total-1;
  document.getElementById('ovDetails').innerHTML   =
    '<div class="orow"><span class="olbl">📅 Date</span><span>'    + u.date              + '</span></div>' +
    '<div class="orow"><span class="olbl">🗂 Head</span><span>'    + u.head              + '</span></div>' +
    '<div class="orow"><span class="olbl">💰 Amount</span><span>₹' + u.amount            + '</span></div>' +
    '<div class="orow"><span class="olbl">📝 Note</span><span>'    + (u.narration||'—')  + '</span></div>';
  document.getElementById('ovImg').src = IMGS[cur] || '';
}
document.getElementById('ov').addEventListener('click', function(e) {
  if (e.target === this) closePh();
});
<\/script>
</body>
</html>`;

      // Download HTML viewer first
      const blob = new Blob([html], {type:'text/html'});
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = htmlFile;
      a.click();

      // Download Excel after short delay
      setTimeout(() => {
        XLSX.writeFile(wb, societyName + '_expenses.xlsx');
        alert(
          '✔ Downloaded 2 files!\n\n' +
          '1. ' + societyName + '_expenses.xlsx\n   → Open in Excel\n\n' +
          '2. ' + htmlFile + '\n   → Open in browser\n' +
          '   → Same rows as Excel\n' +
          '   → Click "Click Me" to see photo\n' +
          '   → "← Back to List" to return'
        );
      }, 700);
    })
    .catch(e => alert('Export failed: ' + e.message));
}
</script>
</body>
</html>
