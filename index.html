<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Society Management Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --brown-dark: #5a3825;
    --brown-mid:  #8b5e3c;
    --brown-light:#c49a6c;
    --cream:      #f9f4ef;
    --bg:         #e6c9a8;
    --white:      #ffffff;
    --red:        #c0392b;
    --red-hover:  #a93226;
    --shadow:     0 10px 30px rgba(90,56,37,0.15);
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Lato', sans-serif;
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    background-image: radial-gradient(ellipse at top left, #d4a96a 0%, #e6c9a8 50%, #c9a882 100%);
  }

  /* ── Pages ── */
  .page {
    display: none;
    width: 90%;
    max-width: 560px;
    margin: 50px auto 80px;
    background: var(--white);
    padding: 32px 28px;
    border-radius: 20px;
    box-shadow: var(--shadow);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── Typography ── */
  h2 {
    font-family: 'Playfair Display', serif;
    text-align: center;
    color: var(--brown-dark);
    margin: 0 0 24px;
    font-size: 1.7rem;
  }
  h3 {
    font-family: 'Playfair Display', serif;
    color: var(--brown-dark);
    margin: 22px 0 10px;
    font-size: 1.15rem;
    border-bottom: 2px solid var(--bg);
    padding-bottom: 6px;
  }

  /* ── Inputs ── */
  input[type="text"],
  input[type="email"],
  input[type="password"],
  input[type="number"],
  input[type="date"] {
    width: 100%;
    padding: 11px 14px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1.5px solid #ddd;
    font-family: inherit;
    font-size: 0.95rem;
    background: var(--cream);
    transition: border 0.2s;
    display: block;
  }
  input:focus { outline: none; border-color: var(--brown-light); }

  /* select styled same as input */
  select.inp {
    width: 100%;
    padding: 11px 14px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1.5px solid #ddd;
    font-family: inherit;
    font-size: 0.95rem;
    background: var(--cream);
    color: #333;
    transition: border 0.2s;
    display: block;
    appearance: auto;
  }
  select.inp:focus { outline: none; border-color: var(--brown-light); }

  /* password preview hint */
  .pwd-hint {
    font-size: 0.8rem;
    color: var(--brown-mid);
    margin: 2px 0 6px 2px;
    min-height: 18px;
    font-style: italic;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--brown-mid);
    color: white;
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    font-size: 1rem;
  }
  .btn-primary:hover { background: var(--brown-dark); }
  .btn-sm { padding: 7px 14px; font-size: 0.82rem; border-radius: 8px; }
  .btn-open   { background: var(--brown-mid); color: white; }
  .btn-open:hover   { background: var(--brown-dark); }
  .btn-delete { background: var(--red); color: white; }
  .btn-delete:hover { background: var(--red-hover); }
  .btn-export { background: #2e7d32; color: white; }
  .btn-export:hover { background: #1b5e20; }
  .btn-back {
    background: transparent;
    color: var(--brown-mid);
    border: 1.5px solid var(--brown-mid);
    margin-bottom: 16px;
    padding: 8px 16px;
  }
  .btn-back:hover { background: var(--brown-mid); color: white; }

  /* camera / gallery split */
  .photo-btns { display: flex; gap: 10px; margin: 6px 0; }
  .photo-btns .btn {
    flex: 1;
    padding: 11px 8px;
    font-size: 0.88rem;
    text-align: center;
    margin-top: 0;
    background: var(--brown-mid);
    color: white;
    width: auto;
  }
  .photo-btns .btn.gallery { background: #6d4c41; }
  .photo-btns .btn:hover   { background: var(--brown-dark); }

  /* ── Cards ── */
  .card {
    background: var(--cream);
    padding: 14px 16px;
    margin: 10px 0;
    border-radius: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.07);
  }
  .society-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .society-card .name { font-weight:700; color:var(--brown-dark); font-size:0.95rem; flex:1; }
  .society-card .uid  { color:#888; font-size:0.8rem; }
  .society-card .actions { display:flex; gap:6px; flex-wrap:wrap; }

  .upload-card img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 10px;
    max-height: 260px;
    object-fit: cover;
    cursor: zoom-in;
  }
  .upload-card .detail-row { display:flex; gap:6px; margin:4px 0; font-size:0.9rem; }
  .upload-card .label { font-weight:700; color:var(--brown-dark); min-width:80px; }

  /* ── Society list scroll ── */
  #societyList { max-height:340px; overflow-y:auto; padding-right:4px; }
  #societyList::-webkit-scrollbar { width:5px; }
  #societyList::-webkit-scrollbar-thumb { background:var(--brown-light); border-radius:4px; }

  /* ── FAB Upload Button ── */
  #uploadBtn {
    position: fixed;
    bottom: 28px; right: 28px;
    background: var(--brown-mid);
    width: 58px; height: 58px;
    border-radius: 50%;
    font-size: 30px;
    color: white;
    border: none;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    cursor: pointer;
    display: none;
    transition: background 0.2s, transform 0.2s;
    line-height: 1;
  }
  #uploadBtn:hover { background:var(--brown-dark); transform:scale(1.08) rotate(45deg); }

  /* ── Upload Modal ── */
  #uploadModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #uploadModal.open { display:flex; }
  #uploadModal .modal-box {
    background: white;
    border-radius: 20px;
    padding: 28px 26px;
    width: 90%;
    max-width: 440px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    animation: fadeIn 0.25s ease;
  }
  #uploadModal h3 { margin-top:0; border:none; }
  .modal-close { float:right; background:none; border:none; font-size:1.4rem; cursor:pointer; color:#888; line-height:1; }
  .modal-close:hover { color:var(--brown-dark); }

  /* ── Status / compress ── */
  #compressStatus { font-size:0.8rem; color:var(--brown-mid); margin-top:4px; min-height:18px; }

  /* ── Lightbox ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 200;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.open { display:flex; }
  #lightbox img { max-width:94vw; max-height:90vh; border-radius:10px; box-shadow:0 0 40px rgba(0,0,0,.5); }

  /* ── Empty state ── */
  .empty-state { text-align:center; color:#aaa; padding:30px 0; font-style:italic; }
</style>
</head>
<body>

<!-- ════════ LOGIN ════════ -->
<div class="page" id="loginPage" style="display:block;">
  <h2>🏘️ Society Expense Portal</h2>
  <input type="email"    id="userid"   placeholder="Email Address">
  <input type="password" id="password" placeholder="Password"
         onkeydown="if(event.key==='Enter')login()">
  <button class="btn btn-primary" onclick="login()">Login</button>
</div>

<!-- ════════ SUPER ADMIN ════════ -->
<div class="page" id="superadminPage">
  <h2>Super Admin Dashboard</h2>

  <h3>➕ Create New Society</h3>

  <input type="text"  id="socName"  placeholder="Society Name (e.g. Sunrise Apartments)" oninput="previewPassword()">
  <input type="date"  id="socDate"  placeholder="Start Date">

  <!-- CHANGE 2: Admin enters real society email; password is auto-generated -->
  <input type="email" id="socEmail" placeholder="Society Email (e.g. sunrise@gmail.com)">
  <div class="pwd-hint" id="pwdPreview"></div>

  <button class="btn btn-primary" onclick="createSociety()">Create Society</button>

  <h3>🏢 Existing Societies</h3>
  <div id="societyList"></div>
</div>

<!-- ════════ MEMBER / SOCIETY VIEW ════════ -->
<div class="page" id="memberPage">
  <button class="btn btn-back" id="backBtn" style="display:none;" onclick="goBack()">← Back</button>
  <h2 id="memberSocName"></h2>
  <div id="uploads"></div>
  <div id="uploadsEmpty" class="empty-state" style="display:none;">No bills uploaded yet.</div>
</div>

<!-- ════════ FLOATING UPLOAD BUTTON ════════ -->
<button id="uploadBtn" onclick="openUpload()">+</button>

<!-- ════════ UPLOAD MODAL ════════ -->
<div id="uploadModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeUpload()">✕</button>
    <h3>📎 Upload Bill / Voucher</h3>

    <!-- CHANGE 1: Camera / Gallery buttons -->
    <div class="photo-btns">
      <button type="button" class="btn" onclick="document.getElementById('photo_camera').click()">📷 Camera</button>
      <button type="button" class="btn gallery"  onclick="document.getElementById('photo_gallery').click()">🖼 Gallery</button>
    </div>
    <!-- capture=environment → opens rear camera directly on mobile -->
    <input type="file" id="photo_camera"  accept="image/*" capture="environment" style="display:none" onchange="onPhotoSelected(this)">
    <!-- no capture → opens gallery / file picker -->
    <input type="file" id="photo_gallery" accept="image/*"                        style="display:none" onchange="onPhotoSelected(this)">
    <div id="compressStatus"></div>

    <input type="date" id="date">

    <!-- CHANGE: Head dropdown with 19 options + Other -->
    <select class="inp" id="head" onchange="onHeadChange()">
      <option value="">-- Select Expense Head --</option>
      <option>Electricity</option>
      <option>Water Charges</option>
      <option>Maintenance &amp; Repairs</option>
      <option>Housekeeping / Cleaning</option>
      <option>Security / Watchman</option>
      <option>Salaries</option>
      <option>Lift Maintenance</option>
      <option>Garden / Landscaping</option>
      <option>Pest Control</option>
      <option>Generator / Fuel</option>
      <option>Printing &amp; Stationery</option>
      <option>Plumbing</option>
      <option>Painting &amp; Whitewash</option>
      <option>Bank Charges</option>
      <option>Insurance</option>
      <option>Audit / Legal Fees</option>
      <option>Telephone / Internet</option>
      <option>Conveyance</option>
      <option>Miscellaneous</option>
      <option value="__other__">Other (type below)</option>
    </select>
    <!-- shown only when Other is picked -->
    <input type="text" id="head_other" placeholder="Type expense head name" style="display:none;">

    <input type="number" id="amount"    placeholder="Amount (₹)">
    <input type="text"   id="narration" placeholder="Short Narration (optional)">

    <button class="btn btn-primary" id="uploadSubmitBtn" onclick="saveUpload()" style="margin-top:14px;">
      Upload
    </button>
  </div>
</div>

<!-- ════════ IMAGE LIGHTBOX ════════ -->
<div id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="" alt="Bill">
</div>

<!-- ════════ SCRIPTS ════════ -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ════════════════════════════════════════════
//  FIREBASE CONFIG — DO NOT CHANGE
// ════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyCY1hdpbGyN7byYyNOg7VHLEzfeadnddGI",
  authDomain:        "society-management-d19f9.firebaseapp.com",
  projectId:         "society-management-d19f9",
  storageBucket:     "society-management-d19f9.firebasestorage.app",
  messagingSenderId: "145344389199",
  appId:             "1:145344389199:web:a32affa5732fc825460a3a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentSociety = null;
let isSuperAdmin   = false;
let _compressedImg = '';   // compressed image ready to save

// ════════════════════════════════════════════
//  PASSWORD AUTO-GENERATOR
//  Takes the email entered by admin, makes a
//  simple memorable password from it
//  e.g. sunrise@gmail.com → Sunrise@2025
// ════════════════════════════════════════════
function generatePassword(socName) {
  if (!socName) return '';
  // Take first 4 letters of society name, lowercase, + @123
  // e.g. "Sunrise Apartments" → "sunr@123"
  const clean = socName.trim().toLowerCase().replace(/[^a-z]/g, ''); // letters only
  const part  = clean.substring(0, 4);                               // first 4 letters
  return part + '@123';
}

// Show preview under the email field as admin types
function previewPassword() {
  const name = document.getElementById('socName').value.trim();
  const hint = document.getElementById('pwdPreview');
  if (name.length >= 1) {
    hint.textContent = '🔑 Auto password will be: ' + generatePassword(name);
  } else {
    hint.textContent = '';
  }
}

// ════════════════════════════════════════════
//  IMAGE COMPRESSION
//  Resizes to max 900px, JPEG quality stepped
//  down until safely under 700KB
// ════════════════════════════════════════════
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.onload  = e => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not load image'));
      img.onload  = () => {
        const MAX_W = 900;
        let w = img.width, h = img.height;
        if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }

        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);

        const SAFE = 700 * 1024;   // 700 KB in base64 chars
        let data = canvas.toDataURL('image/jpeg', 0.60);
        if (data.length > SAFE) data = canvas.toDataURL('image/jpeg', 0.40);
        if (data.length > SAFE) data = canvas.toDataURL('image/jpeg', 0.25);
        if (data.length > SAFE) {
          // Last resort — shrink to 600px
          const c2 = document.createElement('canvas');
          const r  = 600 / w;
          c2.width  = 600;
          c2.height = Math.round(h * r);
          c2.getContext('2d').drawImage(canvas, 0, 0, c2.width, c2.height);
          data = c2.toDataURL('image/jpeg', 0.30);
        }
        resolve(data);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Called when user picks a photo — compress immediately
function onPhotoSelected(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('compressStatus');
  const btn    = document.getElementById('uploadSubmitBtn');
  const origKB = (file.size / 1024).toFixed(0);
  status.textContent = `⏳ Compressing photo (${origKB} KB)…`;
  btn.disabled = true;
  _compressedImg = '';

  compressImage(file)
    .then(data => {
      _compressedImg = data;
      const newKB = Math.round(data.length * 0.75 / 1024);
      status.textContent = `✔ Photo ready — ~${newKB} KB`;
      btn.disabled = false;
    })
    .catch(err => {
      status.textContent = '⚠ Could not process image. Try another.';
      btn.disabled = false;
      console.error(err);
    });
}

// ════════════════════════════════════════════
//  HEAD DROPDOWN — show/hide "Other" box
// ════════════════════════════════════════════
function onHeadChange() {
  const other = document.getElementById('head_other');
  if (document.getElementById('head').value === '__other__') {
    other.style.display = 'block';
    other.focus();
  } else {
    other.style.display = 'none';
    other.value = '';
  }
}

// ════════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════════
function login() {
  const email = document.getElementById('userid').value.trim();
  const pwd   = document.getElementById('password').value.trim();

  if (email === 'companyadmin@gmail.com' && pwd === 'admin@123') {
    isSuperAdmin = true;
    showPage('superadminPage');
    loadSocieties();
    return;
  }

  // Society login — check email AND password in Firestore
  db.collection('societies')
    .where('email', '==', email)
    .where('password', '==', pwd)
    .get()
    .then(snap => {
      if (snap.empty) { alert('Invalid email or password.'); return; }
      snap.forEach(doc => { currentSociety = doc.data().name; });
      isSuperAdmin = false;
      showPage('memberPage');
      document.getElementById('uploadBtn').style.display    = 'block';
      document.getElementById('memberSocName').innerText    = currentSociety.toUpperCase();
      document.getElementById('backBtn').style.display      = 'none';
      loadUploads();
    })
    .catch(err => alert('Error: ' + err.message));
}

// ════════════════════════════════════════════
//  PAGE HELPER
// ════════════════════════════════════════════
function showPage(id) {
  ['loginPage', 'superadminPage', 'memberPage'].forEach(p => {
    document.getElementById(p).style.display = 'none';
  });
  document.getElementById(id).style.display = 'block';
}

// ════════════════════════════════════════════
//  CREATE SOCIETY
//  Admin enters: name + date + society's real email
//  Password is auto-generated from the email
// ════════════════════════════════════════════
function createSociety() {
  const name  = document.getElementById('socName').value.trim();
  const date  = document.getElementById('socDate').value;
  const email = document.getElementById('socEmail').value.trim().toLowerCase();

  if (!name || !date || !email) {
    alert('Please fill:\n• Society Name\n• Start Date\n• Society Email');
    return;
  }
  if (!email.includes('@') || !email.includes('.')) {
    alert('Please enter a valid email address.');
    return;
  }

  // Auto-generate password from email
  const password = generatePassword(name);

  // Check if email already used
  db.collection('societies').where('email', '==', email).get()
    .then(existing => {
      if (!existing.empty) {
        alert('This email is already registered for another society!');
        return;
      }
      return db.collection('societies').add({
        name: name.toLowerCase(),
        date,
        email,
        password
      });
    })
    .then(ref => {
      if (!ref) return; // was blocked above
      alert(
        '✔ Society Created!\n\n' +
        'Society : ' + name + '\n' +
        'Email   : ' + email + '\n' +
        'Password: ' + password + '\n\n' +
        'Share these login details with the society.'
      );
      document.getElementById('socName').value  = '';
      document.getElementById('socDate').value  = '';
      document.getElementById('socEmail').value = '';
      document.getElementById('pwdPreview').textContent = '';
      loadSocieties();
    })
    .catch(err => alert('Error: ' + err.message));
}

// ════════════════════════════════════════════
//  LOAD SOCIETIES
// ════════════════════════════════════════════
function loadSocieties() {
  db.collection('societies').get().then(snap => {
    if (snap.empty) {
      document.getElementById('societyList').innerHTML =
        "<div class='empty-state'>No societies yet. Create one above!</div>";
      return;
    }
    let html = '';
    snap.forEach(doc => {
      const d = doc.data();
      // CHANGE 4: society name in ALL CAPS
      html += `
        <div class="card society-card">
          <div>
            <div class="name">${d.name.toUpperCase()}</div>
            <div class="uid">${d.email}</div>
          </div>
          <div class="actions">
            <button class="btn btn-sm btn-export" onclick="exportSocietyData('${d.name}','${doc.id}')">⬇ Excel</button>
            <button class="btn btn-sm btn-open"   onclick="openSociety('${d.name}')">Open</button>
            <button class="btn btn-sm btn-delete" onclick="deleteSociety('${doc.id}')">Delete</button>
          </div>
        </div>`;
    });
    document.getElementById('societyList').innerHTML = html;
  });
}

// ════════════════════════════════════════════
//  OPEN SOCIETY / BACK
// ════════════════════════════════════════════
function openSociety(name) {
  currentSociety = name;
  showPage('memberPage');
  document.getElementById('backBtn').style.display    = 'block';
  document.getElementById('uploadBtn').style.display  = 'none';   // admin = view only
  document.getElementById('memberSocName').innerText  = name.toUpperCase();
  loadUploads();
}

function goBack() {
  currentSociety = null;
  document.getElementById('uploads').innerHTML = '';
  showPage('superadminPage');
  document.getElementById('uploadBtn').style.display = 'none';
  loadSocieties();
}

// ════════════════════════════════════════════
//  UPLOAD MODAL OPEN / CLOSE
// ════════════════════════════════════════════
function openUpload() {
  _compressedImg = '';
  document.getElementById('compressStatus').textContent = '';
  document.getElementById('uploadSubmitBtn').disabled   = false;
  document.getElementById('uploadModal').classList.add('open');
}

function closeUpload() {
  document.getElementById('uploadModal').classList.remove('open');
  // Reset all fields
  ['date', 'amount', 'narration'].forEach(id =>
    document.getElementById(id).value = '');
  document.getElementById('head').value           = '';
  document.getElementById('head_other').value     = '';
  document.getElementById('head_other').style.display = 'none';
  document.getElementById('photo_camera').value   = '';
  document.getElementById('photo_gallery').value  = '';
  document.getElementById('compressStatus').textContent = '';
  _compressedImg = '';
}

// Close modal when tapping outside the box
document.getElementById('uploadModal').addEventListener('click', function(e) {
  if (e.target === this) closeUpload();
});

// ════════════════════════════════════════════
//  SAVE UPLOAD
// ════════════════════════════════════════════
function saveUpload() {
  const date = document.getElementById('date').value;

  // Head — use typed value if "Other" selected
  const headSel = document.getElementById('head').value;
  const head    = headSel === '__other__'
                  ? document.getElementById('head_other').value.trim()
                  : headSel;

  const amount    = document.getElementById('amount').value.trim();
  const narration = document.getElementById('narration').value.trim();

  if (!_compressedImg) {
    alert('Please select a photo first.\nTap 📷 Camera or 🖼 Gallery.');
    return;
  }
  if (!date || !head || !amount) {
    alert('Please fill:\n• Date\n• Expense Head\n• Amount');
    return;
  }

  const btn = document.getElementById('uploadSubmitBtn');
  btn.textContent = 'Uploading…';
  btn.disabled    = true;

  db.collection('uploads').add({
    society: currentSociety,
    image:   _compressedImg,
    date, head, amount, narration,
    timestamp: Date.now()
  })
  .then(() => {
    alert('✔ Bill uploaded successfully!');
    closeUpload();
    btn.textContent = 'Upload';
    btn.disabled    = false;
    loadUploads();
  })
  .catch(err => {
    alert('Upload failed: ' + err.message);
    btn.textContent = 'Upload';
    btn.disabled    = false;
  });
}

// ════════════════════════════════════════════
//  LOAD UPLOADS
// ════════════════════════════════════════════
function loadUploads() {
  const area  = document.getElementById('uploads');
  const empty = document.getElementById('uploadsEmpty');
  area.innerHTML = "<div class='empty-state'>Loading…</div>";

  db.collection('uploads')
    .where('society', '==', currentSociety)
    .get()
    .then(snap => {
      area.innerHTML = '';
      if (snap.empty) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      const docs = [];
      snap.forEach(doc => docs.push(doc.data()));
      docs.sort((a, b) => b.timestamp - a.timestamp);   // newest first

      docs.forEach(u => {
        const div = document.createElement('div');
        div.className = 'card upload-card';
        div.innerHTML = `
          <img src="${u.image}" alt="Bill"
               onclick="openLightbox('${u.image}')"
               title="Click to enlarge">
          <div class="detail-row"><span class="label">📅 Date</span><span>${u.date}</span></div>
          <div class="detail-row"><span class="label">🗂 Head</span><span>${u.head}</span></div>
          <div class="detail-row"><span class="label">💰 Amount</span><span>₹${u.amount}</span></div>
          <div class="detail-row"><span class="label">📝 Note</span><span>${u.narration || '—'}</span></div>`;
        area.appendChild(div);
      });
    })
    .catch(err => {
      area.innerHTML = "<div class='empty-state'>Error loading. Please refresh.</div>";
      console.error(err);
    });
}

// ════════════════════════════════════════════
//  LIGHTBOX
// ════════════════════════════════════════════
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

// ════════════════════════════════════════════
//  DELETE SOCIETY
// ════════════════════════════════════════════
function deleteSociety(docId) {
  if (!confirm('Delete this society?\n\nUploaded bills remain in database.')) return;
  db.collection('societies').doc(docId).delete()
    .then(() => { alert('Society deleted.'); loadSocieties(); })
    .catch(err => alert(err.message));
}

// ════════════════════════════════════════════
//  EXPORT TO EXCEL + HTML VIEWER
//
//  Excel has NO way to show images or open links
//  without security warnings. So the approach is:
//
//  Excel column "View Photo" = plain text "Click Me"
//  + a separate HTML file is downloaded that has
//  ALL photos in a clean table — each row matches
//  the Excel row exactly (same Sr No, Date, Head etc.)
//  Each photo row has a "Back to List" button.
//
//  The HTML file IS the photo viewer. No warnings,
//  no security prompts, no extra steps. Just open
//  the HTML file alongside Excel and click away.
// ════════════════════════════════════════════
function exportSocietyData(societyName) {
  db.collection('uploads')
    .where('society', '==', societyName)
    .get()
    .then(snap => {
      if (snap.empty) { alert('No uploads found for: ' + societyName); return; }

      const docs = [];
      snap.forEach(doc => docs.push(doc.data()));
      docs.sort((a, b) => a.date > b.date ? 1 : -1);

      // ── EXCEL: plain text "Click Me" — no formula, no warning ──
      const rows = [
        ['Sr No', 'Date', 'Expense Head', 'Amount (₹)', 'Narration', 'Society', 'View Photo']
      ];
      docs.forEach((u, i) => {
        rows.push([
          i + 1,
          u.date,
          u.head,
          u.amount,
          u.narration || '',
          u.society,
          u.image ? 'Click Me' : 'No photo'   // plain text, zero warnings
        ]);
      });

      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [{wch:7},{wch:13},{wch:22},{wch:13},{wch:28},{wch:20},{wch:12}];
      XLSX.utils.book_append_sheet(wb, ws, societyName.substring(0, 31));

      // ── HTML VIEWER ────────────────────────────────────────────
      // Layout: left side = scrollable list of all entries as rows
      //         right side (or overlay) = photo of selected entry
      //
      // Actually simpler and more useful:
      // A clean TABLE matching Excel exactly.
      // Last column = "Click Me" button for each row.
      // Clicking opens that photo in an overlay with Back button.
      // ─────────────────────────────────────────────────────────
      const htmlFileName = societyName + '_photos.html';

      // Embed all images as JS array so no external files needed
      let imgArray = 'const IMGS = [
';
      docs.forEach(u => {
        imgArray += '  ' + JSON.stringify(u.image || '') + ',
';
      });
      imgArray += '];';

      let tableRows = '';
      docs.forEach((u, i) => {
        tableRows += `
          <tr id="row${i+1}">
            <td>${i+1}</td>
            <td>${u.date}</td>
            <td>${u.head}</td>
            <td>₹${u.amount}</td>
            <td>${u.narration || '—'}</td>
            <td>${u.society}</td>
            <td>${u.image
              ? `<button class="view-btn" onclick="openPhoto(${i})">Click Me</button>`
              : '<span style="color:#aaa">No photo</span>'}
            </td>
          </tr>`;
      });

      const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>${societyName.toUpperCase()} — Bill Photos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:sans-serif;background:#f0ece4;padding:20px;min-height:100vh}
  h1{color:#5a3825;text-align:center;margin-bottom:6px;font-size:1.4rem}
  .subtitle{text-align:center;color:#888;font-size:.82rem;margin-bottom:20px}

  /* TABLE */
  .tbl-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
  table{width:100%;border-collapse:collapse;background:white;font-size:.88rem}
  thead th{background:#5a3825;color:white;padding:10px 12px;text-align:left;white-space:nowrap}
  tbody td{padding:9px 12px;border-bottom:1px solid #e6c9a8;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#fdf8f3}
  .view-btn{
    background:#8b5e3c;color:white;border:none;
    padding:6px 14px;border-radius:8px;cursor:pointer;
    font-size:.82rem;font-weight:700;white-space:nowrap;
  }
  .view-btn:hover{background:#5a3825}

  /* OVERLAY */
  #overlay{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,0.82);z-index:100;
    align-items:center;justify-content:center;
    flex-direction:column;padding:20px;
  }
  #overlay.open{display:flex}
  #overlay-box{
    background:white;border-radius:16px;
    width:100%;max-width:520px;max-height:90vh;
    overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4);
  }
  #overlay-head{
    background:#5a3825;color:white;
    padding:14px 18px;border-radius:16px 16px 0 0;
    display:flex;align-items:center;justify-content:space-between;
  }
  #overlay-head h3{font-size:1rem;margin:0}
  #back-btn{
    background:rgba(255,255,255,0.2);color:white;border:none;
    padding:6px 14px;border-radius:8px;cursor:pointer;
    font-size:.85rem;font-weight:700;
  }
  #back-btn:hover{background:rgba(255,255,255,0.35)}
  #overlay-body{padding:16px 18px}
  #overlay-body img{width:100%;border-radius:10px;margin-top:12px;display:block}
  .o-row{display:flex;gap:8px;padding:5px 0;font-size:.9rem;border-bottom:1px solid #f0ece4}
  .o-row:last-of-type{border-bottom:none}
  .o-lbl{font-weight:700;color:#5a3825;min-width:70px}
  .nav-row{display:flex;gap:8px;padding:14px 18px;border-top:1px solid #f0ece4;justify-content:center}
  .nav-btn{background:#e6c9a8;color:#5a3825;border:none;padding:7px 16px;border-radius:8px;cursor:pointer;font-weight:700;font-size:.85rem}
  .nav-btn:hover{background:#c49a6c;color:white}
  .nav-btn:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body>
<h1>📋 ${societyName.toUpperCase()} — Bill Photos</h1>
<p class="subtitle">This file matches your Excel exactly. Click "Click Me" on any row to view that bill photo.</p>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th>Sr</th><th>Date</th><th>Expense Head</th>
        <th>Amount</th><th>Narration</th><th>Society</th><th>Photo</th>
      </tr>
    </thead>
    <tbody>${tableRows}</tbody>
  </table>
</div>

<!-- PHOTO OVERLAY -->
<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-head">
      <h3 id="overlay-title">Bill Photo</h3>
      <button id="back-btn" onclick="closePhoto()">← Back to List</button>
    </div>
    <div id="overlay-body">
      <div id="overlay-details"></div>
      <img id="overlay-img" src="" alt="Bill Photo">
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="navPhoto(-1)">◀ Previous</button>
      <span id="nav-label" style="align-self:center;font-size:.85rem;color:#888"></span>
      <button class="nav-btn" id="btn-next" onclick="navPhoto(+1)">Next ▶</button>
    </div>
  </div>
</div>

<script>
${imgArray}

const DATA = ${repr_data};

let _cur = 0;

function openPhoto(idx) {
  _cur = idx;
  renderOverlay();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('overlay-box').scrollTop = 0;
}

function closePhoto() {
  document.getElementById('overlay').classList.remove('open');
  // scroll Excel-matching row into view
  const row = document.getElementById('row' + (_cur + 1));
  if (row) row.scrollIntoView({behavior:'smooth', block:'center'});
}

function navPhoto(dir) {
  _cur = Math.max(0, Math.min(DATA.length - 1, _cur + dir));
  renderOverlay();
  document.getElementById('overlay-box').scrollTop = 0;
}

function renderOverlay() {
  const u = DATA[_cur];
  const total = DATA.length;
  document.getElementById('overlay-title').textContent = 'Sr. ' + (_cur+1) + ' of ' + total;
  document.getElementById('nav-label').textContent = (_cur+1) + ' / ' + total;
  document.getElementById('btn-prev').disabled = _cur === 0;
  document.getElementById('btn-next').disabled = _cur === total - 1;
  document.getElementById('overlay-details').innerHTML =
    '<div class="o-row"><span class="o-lbl">📅 Date</span><span>' + u.date + '</span></div>' +
    '<div class="o-row"><span class="o-lbl">🗂 Head</span><span>' + u.head + '</span></div>' +
    '<div class="o-row"><span class="o-lbl">💰 Amount</span><span>₹' + u.amount + '</span></div>' +
    '<div class="o-row"><span class="o-lbl">📝 Note</span><span>' + (u.narration||'—') + '</span></div>';
  document.getElementById('overlay-img').src = IMGS[_cur] || '';
}

// Close overlay on background click
document.getElementById('overlay').addEventListener('click', function(e){
  if(e.target === this) closePhoto();
});
<\/script>
</body>
</html>`;

      // Replace placeholder with real data
      const dataJson = JSON.stringify(docs.map(u => ({
        date: u.date, head: u.head,
        amount: u.amount, narration: u.narration || ''
      })));
      const finalHtml = html.replace('${repr_data}', dataJson);

      // ── Download HTML first ───────────────────────────────────
      const blob = new Blob([finalHtml], { type: 'text/html' });
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = htmlFileName;
      a.click();

      // ── Download Excel after short delay ─────────────────────
      setTimeout(() => {
        XLSX.writeFile(wb, societyName + '_expenses.xlsx');
        alert(
          '✔ Two files downloaded!\n\n' +
          '1. ' + societyName + '_expenses.xlsx\n' +
          '   → Your main Excel file\n\n' +
          '2. ' + htmlFileName + '\n' +
          '   → Open this in browser\n' +
          '   → Same rows as Excel\n' +
          '   → Click "Click Me" to view photo\n' +
          '   → "← Back to List" returns you to the table'
        );
      }, 700);
    })
    .catch(err => alert('Export failed: ' + err.message));
}
</script>
</body>
</html>
