<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Society Management Portal</title>

<style>
body{
    font-family:"Palatino Linotype", Palatino, serif;
    margin:0;
    background:#e6c9a8;
}
.container{
    width:90%;
    max-width:550px;
    margin:auto;
    margin-top:50px;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
h2{text-align:center;color:#5a3825;margin-bottom:20px;}
h3{color:#5a3825;}
input,button{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:12px;
    border:1px solid #ccc;
    font-family:inherit;
}
button{
    background:#8b5e3c;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{background:#6e452c;}
.card{
    background:#f9f4ef;
    padding:12px;
    margin:12px 0;
    border-radius:15px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}
img{width:100%;border-radius:15px;margin-bottom:8px;}
#uploadBtn{
    position:fixed;
    bottom:25px;
    right:25px;
    background:#8b5e3c;
    width:60px;
    height:60px;
    border-radius:50%;
    font-size:32px;
    color:white;
    border:none;
    box-shadow:0 6px 15px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<div class="container" id="loginPage">
    <h2>Society Expense Portal</h2>
    <input type="text" id="userid" placeholder="User ID">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<div class="container" id="superadminPage" style="display:none;">
    <h2>Super Admin Dashboard</h2>

    <h3>Create Society</h3>
    <input type="text" id="socName" placeholder="Society Name">
    <input type="date" id="socDate">
    <button onclick="createSociety()">Create Society</button>

    <h3>Existing Societies</h3>
    <div id="socList"></div>
    <button onclick="exportSocietyData()">Export Selected Society to Excel</button>
</div>

<div class="container" id="memberPage" style="display:none;">
    <h2 id="memberSocName"></h2>
    <button id="backBtn" style="display:none;" onclick="goBack()">← Back to Dashboard</button>
    <div id="uploads"></div>
</div>

<button id="uploadBtn" style="display:none;" onclick="openUpload()">+</button>

<div class="container" id="uploadForm" style="display:none;">
    <h3>Upload Bill / Voucher</h3>
    <input type="file" id="photo">
    <input type="date" id="date">
    <input type="text" id="head" placeholder="Expense Head">
    <input type="number" id="amount" placeholder="Amount">
    <input type="text" id="narration" placeholder="Short Narration">
    <button onclick="saveUpload()">Upload</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

let superadminID="companyadmin";
let superadminPass="admin123";
let currentSociety=null;

function login(){
    let userid=document.getElementById("userid").value;
    let password=document.getElementById("password").value;

    if(userid===superadminID && password===superadminPass){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("superadminPage").style.display="block";
        loadSocieties();
        return;
    }

    let societies=JSON.parse(localStorage.getItem("societies"))||[];
    let found=societies.find(s=>s.userid===userid && s.password===password);

    if(found){
        currentSociety=found.name;
        document.getElementById("loginPage").style.display="none";
        document.getElementById("memberPage").style.display="block";
        document.getElementById("uploadBtn").style.display="block";
        document.getElementById("memberSocName").innerText=currentSociety;
        loadUploads();
    }else{
        alert("Invalid Login");
    }
}

function createSociety(){
    let name=document.getElementById("socName").value.toLowerCase();
    let date=document.getElementById("socDate").value;

    if(!name||!date){ alert("Fill all fields"); return; }

    let userid=name.substring(0,3)+Math.random().toString(36).substring(2,6);
    let password=name.substring(0,4)+"321";

    let societies=JSON.parse(localStorage.getItem("societies"))||[];
    societies.push({name,date,userid,password});
    localStorage.setItem("societies",JSON.stringify(societies));

    alert("Created!\nUserID: "+userid+"\nPassword: "+password);
    loadSocieties();
}

function loadSocieties(){
    let list=document.getElementById("socList");
    list.innerHTML="";
    let societies=JSON.parse(localStorage.getItem("societies"))||[];
    societies.forEach(s=>{
        let div=document.createElement("div");
        div.className="card";
        div.innerHTML="<b>"+s.name+"</b><br><small>UserID: "+s.userid+"</small>";
        div.onclick=function(){
            currentSociety=s.name;
            viewSocUploads();
        }
        list.appendChild(div);
    });
}

function viewSocUploads(){
    document.getElementById("memberPage").style.display="block";
    document.getElementById("superadminPage").style.display="none";
    document.getElementById("uploadBtn").style.display="none";
    document.getElementById("backBtn").style.display="block";
    document.getElementById("memberSocName").innerText=currentSociety+" (View Only)";
    loadUploads();
}

function goBack(){
    document.getElementById("memberPage").style.display="none";
    document.getElementById("superadminPage").style.display="block";
}

function openUpload(){
    document.getElementById("uploadForm").style.display="block";
}

function saveUpload(){
    let file=document.getElementById("photo").files[0];
    let date=document.getElementById("date").value;
    let head=document.getElementById("head").value;
    let amount=document.getElementById("amount").value;
    let narration=document.getElementById("narration").value;

    if(!file||!date||!head||!amount){ alert("Fill all fields"); return; }

    let reader=new FileReader();

    reader.onload=function(e){
        let uploads=JSON.parse(localStorage.getItem("uploads"))||[];
        uploads.push({
            society:currentSociety,
            image:e.target.result,
            date,head,amount,narration
        });
        localStorage.setItem("uploads",JSON.stringify(uploads));
        alert("Saved successfully");
        document.getElementById("uploadForm").style.display="none";
        loadUploads();
    }
    reader.readAsDataURL(file);
}

function loadUploads(){
    let uploads=JSON.parse(localStorage.getItem("uploads"))||[];
    let area=document.getElementById("uploads");
    area.innerHTML="";
    let filtered=uploads.filter(u=>u.society===currentSociety);

    filtered.forEach(u=>{
        let div=document.createElement("div");
        div.className="card";
        div.innerHTML=
        "<img src='"+u.image+"'>"+
        "<b>Date:</b> "+u.date+"<br>"+
        "<b>Head:</b> "+u.head+"<br>"+
        "<b>Amount:</b> "+u.amount+"<br>"+
        "<b>Narration:</b> "+u.narration;
        area.appendChild(div);
    });
}

function exportSocietyData(){
    if(!currentSociety){ alert("Select society first"); return; }

    let uploads=JSON.parse(localStorage.getItem("uploads"))||[];
    let filtered=uploads.filter(u=>u.society===currentSociety);

    if(filtered.length===0){ alert("No records found"); return; }

    let data=filtered.map(u=>({
        "Society Name":u.society,
        "Date":u.date,
        "Expense Head":u.head,
        "Amount":u.amount,
        "Narration":u.narration
    }));

    let worksheet=XLSX.utils.json_to_sheet(data);
    let workbook=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook,worksheet,"Society Records");
    XLSX.writeFile(workbook,currentSociety+"_Records.xlsx");
}

</script>

</body>
